[loggers]
keys=root

[logger_root]
level = NOTSET
handlers=screen,file

[formatters]
keys=complex

[formatter_complex]
format= %(asctime)s - %(name)s - %(levelname)s - %(module)s : line number %(lineno)d => %(message)s

[handlers]
keys=file,screen

[handler_file]
class=handlers.TimedRotatingFileHandler
interval=midnight
backupCount=5
formatter=complex
level=DEBUG
args=('./logs/client.log',)

[handler_screen]
class=StreamHandler
formatter=complex
level=INFO
args=(sys.stdout,)